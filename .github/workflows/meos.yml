name: Test MEOS compilation

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/meos.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branches-ignore:
      - gh-pages
  pull_request:
    paths:
      - '.github/workflows/meos.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branches-ignore:
      - gh-pages

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      - name: Build
        run: |
          mkdir build
          cd build
          # Enable the optional types to be able to test them below
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on -DCBUFFER=on -DJSON=on ..
          make -j $(nproc)
          sudo make install

      - name: Compile and run 01_hello_world.c
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o 01_hello_world 01_hello_world.c -L/usr/local/lib -lmeos
          ./01_hello_world

      - name: Compile and run meos/test
        run: |
          cd meos/test
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o bool_test bool_test.c -L/usr/local/lib -lmeos
          ./bool_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o cbuffer_test cbuffer_test.c -L/usr/local/lib -lmeos
          ./cbuffer_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o date_test date_test.c -L/usr/local/lib -lmeos
          ./date_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o float_test float_test.c -L/usr/local/lib -lmeos
          ./float_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o geo_test geo_test.c -L/usr/local/lib -lmeos
          gcc -Wall -g -I/usr/local/include -o setspan_test setspan_test.c -L/usr/local/lib -lmeos
          ./setspan_test
          gcc -Wall -g -I/usr/local/include -o typeof_test typeof_test.c -L/usr/local/lib -lmeos
          ./typeof_test
          gcc -Wall -g -I/usr/local/include -o temporal_test temporal_test.c -L/usr/local/lib -lmeos
          ./temporal_test
          gcc -Wall -g -I/usr/local/include -o geo_test geo_test.c -L/usr/local/lib -lmeos
          ./geo_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o json_test json_test.c -L/usr/local/lib -lmeos
          ./json_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o tjsonb_smoketest tjsonb_smoketest.c -L/usr/local/lib -lmeos -lm
          ./tjsonb_smoketest
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o int_test int_test.c -L/usr/local/lib -lmeos
          ./int_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o interval_test interval_test.c -L/usr/local/lib -lmeos
          ./interval_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o numeric_test numeric_test.c -L/usr/local/lib -lmeos
          ./numeric_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o setspan_test setspan_test.c -L/usr/local/lib -lmeos
          ./setspan_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o tbox_test tbox_test.c -L/usr/local/lib -lmeos
          ./tbox_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o temporal_test temporal_test.c -L/usr/local/lib -lmeos
          ./temporal_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o text_test text_test.c -L/usr/local/lib -lmeos
          ./text_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o time_test time_test.c -L/usr/local/lib -lmeos
          ./time_test
          gcc -Wall -Werror=implicit-function-declaration -g -I/usr/local/include -o timestamp_test timestamp_test.c -L/usr/local/lib -lmeos
          ./timestamp_test
          gcc -Wall -g -I/usr/local/include -o parse_test parse_test.c -L/usr/local/lib -lmeos
          ./parse_test
          gcc -Wall -g -I/usr/local/include -o npoint_test npoint_test.c -L/usr/local/lib -lmeos
          ./npoint_test
          gcc -Wall -g -I/usr/local/include -o rtree_mest_test rtree_mest_test.c -L/usr/local/lib -lmeos -lm
          ./rtree_mest_test

  threaded:
    name: Thread-safety (TSan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      # Build MEOS with ThreadSanitizer instrumentation. The shared
      # module is linked with -fsanitize=thread so every load of the
      # MEOS_TLS-qualified globals is checked for races.
      - name: Build MEOS with TSan
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on \
            -DCMAKE_C_FLAGS="-fsanitize=thread" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=thread" \
            ..
          make -j $(nproc)
          sudo make install

      - name: Build threaded_test under TSan
        run: |
          cd meos/test
          gcc -Wall -g -O1 -fsanitize=thread \
            -I/usr/local/include -pthread \
            -o threaded_test threaded_test.c \
            -L/usr/local/lib -lmeos

      # Halt-on-error so the job fails on the first reported race.
      - name: Run threaded_test under TSan
        run: |
          cd meos/test
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export TSAN_OPTIONS="halt_on_error=1 second_deadlock_stack=1"
          ./threaded_test 8 5000

  setspan_arrow_conformance:
    name: Closure-type Arrow C Data Interface conformance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      # The set, span, span set, tbox and stbox Arrow export needs only the
      # always-built core; the geometry and geography set base types and the
      # spatiotemporal box use the geo subsystem, which is always compiled.
      - name: Build MEOS
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on ..
          make -j $(nproc)
          sudo make install

      # Compile the validator with the vendored dependency-free nanoarrow
      # amalgamation and run it. nanoarrow imports the MEOS-produced
      # ArrowSchema/ArrowArray with no MEOS knowledge and runs full Arrow
      # C Data Interface validation over the whole nested tree of every set,
      # span, span set, temporal box and spatiotemporal box variant, proving
      # the closure-type export is consumable by an external Arrow engine.
      - name: Validate the closure-type Arrow export with nanoarrow
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -g -I/usr/local/include -I"$GITHUB_WORKSPACE" \
            -o setspan_arrow_validate setspan_arrow_validate.c \
            "$GITHUB_WORKSPACE/nanoarrow/nanoarrow.c" \
            -L/usr/local/lib -lmeos
          ./setspan_arrow_validate
